<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock</title>
  <link rel="stylesheet" href="index.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Coming+Soon&family=Jacquard+24&family=Oswald:wght@200..700&family=The+Girl+Next+Door&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>World Clock</h1>

    <label for="city-select">Select a city:</label>
    <select id="city-select">
      <option value="">-- Select a city --</option>
      <option value="America/Los_Angeles">Los Angeles 🇺🇸</option>
      <option value="Europe/London">London 🇬🇧</option>
      <option value="Europe/Paris">Paris 🇫🇷</option>
      <option value="America/New_York">New York 🇺🇸</option>
      <option value="current">Current Location 🌎</option>
    </select>

    <div class="city" data-tz="America/Los_Angeles">
      <h2>Los Angeles 🇺🇸</h2>
      <div class="date">March 3 2026</div>
      <div class="time">2:14:26 pm</div>
    </div>

    <div class="city" data-tz="Europe/London">
      <h2>London 🇬🇧</h2>
      <div class="date">March 3 2026</div>
      <div class="time">2:14:26 pm</div>
    </div>

    <div class="city" data-tz="Europe/Paris">
      <h2>Paris 🇫🇷</h2>
      <div class="date">March 3 2026</div>
      <div class="time">2:14:26 pm</div>
    </div>

  </div>

  <footer>
    This was coded by <a href="https://github.com/VonjanaeChatt">Vonjanae Chatt</a>,is open-sourced on <a href="https://github.com/VonjanaeChatt/world-clock">GitHub</a>and is hosted on <a href=https://vcworldclock.netlify.app/>Netlify</a>
  </footer>

  <script src="index.js"></script>
</body>
</html>
